services:
  postgres:
    image: postgres:16-alpine
    container_name: kerno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kerno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kerno}
      POSTGRES_DB: ${POSTGRES_DB:-kerno}
    ports:
      - "5432:5432"
    volumes:
      - kerno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kerno}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kerno_pgdata:
